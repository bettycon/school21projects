---
- name: Install dependencies
  apt:
    name:
      - consul
    state: present
    update_cache: yes

- name: Create consul user
  user:
    name: consul
    system: yes
    shell: /bin/false
    home: /opt/consul
    state: present

- name: Create Consul configuration directory
  file:
    path: /etc/consul.d
    state: directory
    owner: consul
    group: consul
    mode: '0755'

- name: Copy consul client configuration based on host
  copy:
    src: "{{ 'consul_client_api.hcl' if 'api' in group_names else 'consul_client_db.hcl' }}"
    dest: /etc/consul.d/consul.hcl
    owner: consul
    group: consul
    mode: '0644'

- name: Create Consul data directory
  file:
    path: /opt/consul
    state: directory
    owner: consul
    group: consul
    mode: '0755'

- name: Start and enable Consul service
  systemd:
    name: consul
    state: started
    enabled: yes

- name: Display installation status
  debug:
    msg: "Consul client installed on {{ inventory_hostname }}"
