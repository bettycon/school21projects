---
- name: Install dependencies
  apt:
    name:
      - curl
      - wget
      - unzip
      - software-properties-common
    state: present
    update_cache: yes

- name: Install Consul from Ubuntu repositories
  apt:
    name: consul
    state: present

- name: Create consul user
  user:
    name: consul
    system: yes
    shell: /bin/false
    home: /opt/consul
    state: present

- name: Create Consul configuration directory
  file:
    path: /etc/consul.d
    state: directory
    owner: consul
    group: consul
    mode: '0755'

- name: Copy consul server configuration
  copy:
    src: consul_server.hcl
    dest: /etc/consul.d/consul.hcl
    owner: consul
    group: consul
    mode: '0644'

- name: Create Consul data directory
  file:
    path: /opt/consul
    state: directory
    owner: consul
    group: consul
    mode: '0755'

- name: Start and enable Consul service
  systemd:
    name: consul
    state: started
    enabled: yes

- name: Wait for Consul to start
  wait_for:
    port: 8500
    delay: 10
    timeout: 30

- name: Verify Consul status
  command: consul members
  register: consul_status
  changed_when: false

- name: Display Consul status
  debug:
    var: consul_status.stdout
