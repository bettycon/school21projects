events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    upstream session-service {
        server session-service:8081;
    }
    
    upstream hotel-service {
        server hotel-service:8082;
    }
    
    upstream booking-service {
        server booking-service:8083;
    }
    
    upstream loyalty-service {
        server loyalty-service:8085;
    }

    server {
        listen 80;
        server_name localhost;

        # Auth endpoint
        location /api/v1/auth/ {
            proxy_pass http://session-service/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Hotels endpoint
        location /api/v1/hotels {
            proxy_pass http://hotel-service/api/v1/hotels;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Booking endpoint 
        location /api/v1/reservations {
            # Перехватываем запрос
            proxy_intercept_errors on;
            
                        proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Content-Type "application/json";
            
            # Проксируем на booking-service
            proxy_pass http://booking-service/reservations;
        }

        # Loyalty endpoint
        location /api/v1/loyaltyBalances {
            proxy_pass http://loyalty-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

