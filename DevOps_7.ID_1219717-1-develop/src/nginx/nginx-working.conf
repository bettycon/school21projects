events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Health checks
        location /health {
            proxy_pass http://gateway-service:8087/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /auth/health {
            proxy_pass http://session-service:8081/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # API routes
        location /api/ {
            proxy_pass http://gateway-service:8087/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /auth/ {
            proxy_pass http://session-service:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Default response
        location / {
            return 200 "Booking App API Gateway\nAccess endpoints:\n- Health: /health\n- Auth Health: /auth/health\n- API: /api/*\n- Auth: /auth/*\n";
            add_header Content-Type text/plain;
        }
    }
}
