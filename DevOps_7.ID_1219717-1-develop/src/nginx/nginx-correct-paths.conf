events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Auth service - убираем дублирование /api
        location /auth/ {
            proxy_pass http://session-service:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Gateway service - сохраняем полный путь /api/v1
        location /api/ {
            proxy_pass http://gateway-service:8087/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Корневой путь
        location / {
            add_header Content-Type text/plain;
            return 200 "Booking App - Correct Configuration\n\nAuth endpoints: /auth/api/v1/auth/*\nAPI endpoints: /api/v1/*\n\nExamples:\n- POST /auth/api/v1/auth/login\n- GET /api/v1/hotels\n- GET /api/v1/reservations\n";
        }
    }
}
