events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    upstream gateway_backend {
        server gateway-service:8087;
    }
    
    upstream session_backend {
        server session-service:8081;
    }

    server {
        listen 80;
        server_name localhost;

        # Прокси для API через gateway
        location /api/ {
            proxy_pass http://gateway_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Прокси для аутентификации
        location /auth/ {
            proxy_pass http://session_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health checks
        location /health {
            proxy_pass http://gateway_backend/health;
            proxy_set_header Host $host;
        }

        location /auth/health {
            proxy_pass http://session_backend/health;
            proxy_set_header Host $host;
        }

        # Default response - исправленная версия
        location / {
            add_header Content-Type text/plain;
            return 200 "nginx is working";
        }
    }
}
