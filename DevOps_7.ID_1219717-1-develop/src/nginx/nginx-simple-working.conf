events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Прямые proxy без сложных маршрутов
        location /gateway/ {
            proxy_pass http://gateway-service:8087/;
            proxy_set_header Host $host;
        }
        
        location /session/ {
            proxy_pass http://session-service:8081/;
            proxy_set_header Host $host;
        }

        # Default response
        location / {
            return 200 "Booking App API Gateway\nTest endpoints:\n- Gateway: /gateway/actuator/health\n- Session: /session/actuator/health\n";
            add_header Content-Type text/plain;
        }
    }
}
