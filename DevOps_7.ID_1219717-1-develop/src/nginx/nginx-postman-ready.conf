events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Auth endpoints - session service
        location /api/v1/auth/ {
            proxy_pass http://session-service:8081/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Gateway endpoints - gateway service  
        location /api/v1/gateway/ {
            rewrite ^/api/v1/gateway/(.*) /api/v1/$1 break;
            proxy_pass http://gateway-service:8087;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Info page
        location / {
            add_header Content-Type text/plain;
            return 200 "Booking App - Ready for Postman Tests! ✅\n\nUse these URLs in Postman:\n\nAUTH:\n- POST http://192.168.56.10/api/v1/auth/login\n- GET  http://192.168.56.10/api/v1/auth/authorize\n\nGATEWAY:\n- GET  http://192.168.56.10/api/v1/gateway/hotels\n- GET  http://192.168.56.10/api/v1/gateway/hotels/{UUID}\n- GET  http://192.168.56.10/api/v1/gateway/loyalty\n- GET  http://192.168.56.10/api/v1/gateway/reservations\n\nAll tests should return 200 OK!\n";
        }
    }
}
