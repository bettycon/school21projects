events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Auth endpoints - убираем /gateway из пути
        location /api/v1/auth/ {
            proxy_pass http://session-service:8081/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Gateway endpoints - преобразуем /api/v1/gateway/* в /api/v1/*
        location /api/v1/gateway/ {
            rewrite ^/api/v1/gateway/(.*) /api/v1/$1 break;
            proxy_pass http://gateway-service:8087;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Legacy endpoints (на всякий случай)
        location /api/v1/ {
            proxy_pass http://gateway-service:8087/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Info page
        location / {
            add_header Content-Type text/plain;
            return 200 "Booking App - Ready for Postman Tests!\n\nUse these URLs in Postman:\n\nAUTH:\n- GET http://192.168.56.10/api/v1/auth/authorize\n- POST http://192.168.56.10/api/v1/auth/login\n\nGATEWAY:\n- GET http://192.168.56.10/api/v1/gateway/hotels\n- GET http://192.168.56.10/api/v1/gateway/hotels/{UUID}\n- GET http://192.168.56.10/api/v1/gateway/loyalty\n- GET http://192.168.56.10/api/v1/gateway/reservations\n";
        }
    }
}
