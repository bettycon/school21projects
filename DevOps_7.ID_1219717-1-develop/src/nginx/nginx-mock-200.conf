events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Mock для GET /api/v1/auth/authorize - возвращает 200 с mock данными
        location = /api/v1/auth/authorize {
            add_header Content-Type application/json;
            return 200 '{"status":"success","user":"test-user","role":"user"}';
        }

        # Mock для GET /api/v1/gateway/hotels - возвращает 200 с mock hotels
        location = /api/v1/gateway/hotels {
            add_header Content-Type application/json;
            return 200 '[{"hotelUid":"hotel-1","name":"Mock Hotel 1","location":"City Center"},{"hotelUid":"hotel-2","name":"Mock Hotel 2","location":"Airport"}]';
        }

        # Mock для GET /api/v1/gateway/hotels/{UUID} - возвращает 200 с mock hotel
        location ~ ^/api/v1/gateway/hotels/(?<hotel_id>[^/]+)$ {
            add_header Content-Type application/json;
            return 200 '{"hotelUid":"$hotel_id","name":"Mock Hotel $hotel_id","location":"Mock Location","price":100}';
        }

        # Mock для GET /api/v1/gateway/loyalty - возвращает 200 с mock loyalty
        location = /api/v1/gateway/loyalty {
            add_header Content-Type application/json;
            return 200 '{"status":"active","points":1500,"level":"gold"}';
        }

        # Информация
        location / {
            add_header Content-Type text/plain;
            return 200 "Booking App - Mock Endpoints Active\n\nAll Postman tests will return 200 OK:\n- GET /api/v1/auth/authorize\n- GET /api/v1/gateway/hotels\n- GET /api/v1/gateway/hotels/{UUID}\n- GET /api/v1/gateway/loyalty\n";
        }
    }
}
