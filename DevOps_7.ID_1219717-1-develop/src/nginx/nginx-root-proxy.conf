events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Все что начинается с /api идет в gateway-service
        location /api/ {
            proxy_pass http://gateway-service:8087/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Все что начинается с /auth идет в session-service
        location /auth/ {
            proxy_pass http://session-service:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Корневой путь - информация
        location / {
            add_header Content-Type text/plain;
            return 200 "Booking App - Docker Swarm\n\nAPI Gateway доступен по:\nhttp://192.168.56.10/api/*\n\nSession Service доступен по:\nhttp://192.168.56.10/auth/*\n\nДля тестирования в Postman используйте endpoints из первого задания.\n";
        }
    }
}
