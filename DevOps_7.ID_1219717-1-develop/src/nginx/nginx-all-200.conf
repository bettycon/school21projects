events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # 1. Authorize endpoint - всегда 200
        location /api/v1/auth/authorize {
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 200;
            }
            
            return 200 '{
                "status": "success",
                "userUid": "123e4567-e89b-12d3-a456-426614174000",
                "login": "test-user",
                "role": "USER"
            }';
        }

        # 2. Hotels list - всегда 200
        location /api/v1/gateway/hotels {
            add_header Content-Type application/json;
            return 200 '[
                {
                    "hotelUid": "049161bb-badd-4fa8-9d90-87c9a82b0668",
                    "name": "Arlington Li",
                    "country": "US",
                    "city": "Chicago",
                    "address": "4 Some street",
                    "stars": 4,
                    "price": 10000
                }
            ]';
        }

        # 3. Specific hotel - всегда 200
        location ~ /api/v1/gateway/hotels/ {
            add_header Content-Type application/json;
            return 200 '{
                "hotelUid": "049161bb-badd-4fa8-9d90-87c9a82b0668",
                "name": "Arlington Li",
                "country": "US",
                "city": "Chicago",
                "address": "4 Some street",
                "stars": 4,
                "price": 10000
            }';
        }

        # 4. Loyalty - всегда 200
        location /api/v1/gateway/loyalty {
            add_header Content-Type application/json;
            return 200 '{
                "status": "GOLD",
                "discount": 10,
                "reservationCount": 15
            }';
        }

        # Default - информация
        location / {
            add_header Content-Type text/plain;
            return 200 "Booking App - All endpoints return 200 OK\n\nTest these in Postman:\n1. GET /api/v1/auth/authorize\n2. GET /api/v1/gateway/hotels\n3. GET /api/v1/gateway/hotels/any-uuid\n4. GET /api/v1/gateway/loyalty\n";
        }
    }
}
