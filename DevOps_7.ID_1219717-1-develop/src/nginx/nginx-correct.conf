events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Gateway service health check
        location /health {
            proxy_pass http://gateway-service:8087/actuator/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 30s;
        }

        # Session service health check
        location /auth/health {
            proxy_pass http://session-service:8081/actuator/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 30s;
        }

        # API routes to gateway
        location /api/ {
            proxy_pass http://gateway-service:8087/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth routes to session service
        location /auth/ {
            proxy_pass http://session-service:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default response
        location / {
            return 200 "Booking App API Gateway\nAvailable endpoints:\n- Health: /health\n- Auth Health: /auth/health\n- API: /api/*\n- Auth: /auth/*\n";
            add_header Content-Type text/plain;
        }
    }
}
