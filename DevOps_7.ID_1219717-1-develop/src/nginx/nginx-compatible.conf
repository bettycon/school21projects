events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Auth endpoints - преобразуем /api/v1/auth/* в /auth/api/v1/auth/*
        location /api/v1/auth/ {
            proxy_pass http://session-service:8081/auth/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Gateway endpoints - преобразуем /api/v1/gateway/* в /api/v1/*
        location /api/v1/gateway/ {
            rewrite ^/api/v1/gateway/(.*) /api/v1/$1 break;
            proxy_pass http://gateway-service:8087;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Legacy gateway endpoints (на всякий случай)
        location /api/v1/ {
            proxy_pass http://gateway-service:8087/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Информация
        location / {
            add_header Content-Type text/plain;
            return 200 "Booking App - Compatible with Part 1\n\nUse the same URLs as in Part 1:\n- Auth: localhost:8080/api/v1/auth/*\n- Gateway: localhost:8080/api/v1/gateway/*\n\nExamples:\n- POST localhost:8080/api/v1/auth/login\n- GET localhost:8080/api/v1/gateway/hotels\n- GET localhost:8080/api/v1/gateway/loyalty\n";
        }
    }
}
