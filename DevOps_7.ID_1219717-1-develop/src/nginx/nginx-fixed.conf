events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;  # Docker DNS
    
    upstream gateway_backend {
        server gateway-service:8087 resolve;
    }
    
    upstream session_backend {
        server session-service:8081 resolve;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/ {
            proxy_pass http://gateway_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /auth/ {
            proxy_pass http://session_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://gateway_backend/health;
            proxy_set_header Host $host;
        }

        location /auth/health {
            proxy_pass http://session_backend/health;
            proxy_set_header Host $host;
        }

        location / {
            return 200 "nginx is working\n";
            add_header Content-Type text/plain;
        }
    }
}
