server {
    listen 80;
    server_name shopapi.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    access_log /var/log/nginx/shopapi-ssl.access.log upstream_log;
    http2 on;
    server_name shopapi.local;

    ssl_certificate /etc/ssl/certs/shopapi.local.crt;
    ssl_certificate_key /etc/ssl/private/shopapi.local.key;
    
    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Статические файлы - кэширование 30 дней
    location / {
        root /var/www/shopapi;
        index index.html;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Изображения - максимальное кэширование
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        root /var/www/shopapi;
        expires max;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        gzip off;
    }

    # Редиректы для Swagger
    location = /api/v1 {
        return 301 /docs;
    }
    
    location = /api/v1/ {
        return 301 /docs;
    }

    # API - БЕЗ кэширования
    location /api {
        proxy_pass http://shopapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Явно отключаем кэширование для API
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }

    # Swagger UI - кэширование 1 час
    location /docs {
        proxy_pass http://shopapi_backend;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # OpenAPI спецификация - кэширование 1 день
    location /openapi.json {
        proxy_pass http://shopapi_backend;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ReDoc - кэширование 1 час
    location /redoc {
        proxy_pass http://shopapi_backend;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Алиас для Swagger - кэширование 1 час
    location /swagger {
        return 301 /docs;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Админ панель - кэширование 1 час
    location /admin {
        root /var/www/shopapi;
        index db-admin.html;
        try_files $uri /db-admin.html =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Health check
    location /health {
        proxy_pass http://shopapi_backend;
        proxy_set_header Host $host;
    }

    # Nginx статус
    location /nginx_status {
        stub_status on;
        access_log /var/log/nginx/shopapi-ssl.access.log upstream_log;
        allow 127.0.0.1;
        deny all;
    }
}

# UPSTREAM для балансировки нагрузки
upstream shopapi_backend {
    least_conn;
    server 127.0.0.1:8000 weight=2 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8001 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8002 weight=1 max_fails=3 fail_timeout=30s;
}
