apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-app-config
  labels:
    {{- include "hotel-booking-app.labels" . | nindent 4 }}
data:
  # Database
  POSTGRES_HOST: "{{ .Release.Name }}-postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "hotel_db"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  
  # RabbitMQ
  RABBITMQ_HOST: "{{ .Release.Name }}-rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  RABBITMQ_PASSWORD: "guest"
  RABBITMQ_QUEUE_NAME: "booking_queue"
  RABBITMQ_EXCHANGE: "booking_exchange"
  
  # Service endpoints
  SESSION_SERVICE_HOST: "{{ .Release.Name }}-session-service"
  SESSION_SERVICE_PORT: "8081"
  HOTEL_SERVICE_HOST: "{{ .Release.Name }}-hotel-service"
  HOTEL_SERVICE_PORT: "8082"
  BOOKING_SERVICE_HOST: "{{ .Release.Name }}-booking-service"
  BOOKING_SERVICE_PORT: "8083"
  PAYMENT_SERVICE_HOST: "{{ .Release.Name }}-payment-service"
  PAYMENT_SERVICE_PORT: "8084"
  LOYALTY_SERVICE_HOST: "{{ .Release.Name }}-loyalty-service"
  LOYALTY_SERVICE_PORT: "8085"
  REPORT_SERVICE_HOST: "{{ .Release.Name }}-report-service"
  REPORT_SERVICE_PORT: "8086"
  GATEWAY_SERVICE_HOST: "{{ .Release.Name }}-gateway-service"
  GATEWAY_SERVICE_PORT: "8087"
  
  # Auth UUIDs 
  GATEWAY_SERVICE_UUID: "gateway-uuid-123"
  BOOKING_SERVICE_UUID: "booking-uuid-456"
  # RabbitMQ queue settings
  RABBIT_MQ_QUEUE_NAME: "booking_queue"
  RABBIT_MQ_EXCHANGE: "booking_exchange"
