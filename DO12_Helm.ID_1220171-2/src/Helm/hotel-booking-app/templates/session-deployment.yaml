{{- if .Values.session.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-session-service
  labels:
    {{- include "hotel-booking-app.labels" . | nindent 4 }}
    app: session-service
spec:
  replicas: {{ .Values.session.replicaCount }}
  selector:
    matchLabels:
      app: session-service
  template:
    metadata:
      labels:
        app: session-service
        {{- include "hotel-booking-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 6 }}
      {{- end }}
      containers:
      - name: session-service
        image: "{{ .Values.session.image.repository }}:{{ .Values.session.image.tag }}"
        imagePullPolicy: {{ .Values.session.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.session.service.port }}
        env:
        - name: SERVER_PORT
          value: "{{ .Values.session.service.port }}"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://{{ .Release.Name }}-postgres-service:5432/hotel_db"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "postgres"
        resources:
          {}
{{- end }}
