{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway-service
  labels:
    {{- include "hotel-booking-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app: gateway-service
  ports:
  - port: {{ .Values.gateway.service.port }}
    targetPort: {{ .Values.gateway.service.targetPort }}
    {{- if eq .Values.gateway.service.type "NodePort" }}
    nodePort: {{ .Values.gateway.service.nodePort }}
    {{- end }}
    protocol: TCP
{{- end }}
