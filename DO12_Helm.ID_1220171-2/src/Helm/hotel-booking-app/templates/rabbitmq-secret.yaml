{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-rabbitmq-secret
  labels:
    {{- include "hotel-booking-app.labels" . | nindent 4 }}
type: Opaque
data:
  RABBIT_MQ_PASSWORD: {{ .Values.secrets.rabbitmqSecret.data.RABBIT_MQ_PASSWORD | b64enc | quote }}
{{- end }}
