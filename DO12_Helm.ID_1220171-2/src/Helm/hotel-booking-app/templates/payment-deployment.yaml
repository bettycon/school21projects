{{- if .Values.payment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-payment-service
  labels:
    {{- include "hotel-booking-app.labels" . | nindent 4 }}
    app: payment-service
spec:
  replicas: {{ .Values.payment.replicaCount }}
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        {{- include "hotel-booking-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 6 }}
      {{- end }}
      containers:
      - name: payment-service
        image: "{{ .Values.payment.image.repository }}:{{ .Values.payment.image.tag }}"
        imagePullPolicy: {{ .Values.payment.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.payment.service.port }}
        env:
        - name: SERVER_PORT
          value: "{{ .Values.payment.service.port }}"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://{{ .Release.Name }}-postgres-service:5432/hotel_db"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "postgres"
        resources:
          {}
{{- end }}
