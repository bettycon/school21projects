bookingService:
  image:
    repository: booking-service
    tag: latest
    pullPolicy: IfNotPresent

gatewayService:
  image:
    repository: gateway-service
    tag: latest
    pullPolicy: IfNotPresent

hotelService:
  image:
    repository: hotel-service
    tag: latest
    pullPolicy: IfNotPresent

loyaltyService:
  image:
    repository: loyalty-service
    tag: latest
    pullPolicy: IfNotPresent

paymentService:
  image:
    repository: payment-service
    tag: latest
    pullPolicy: IfNotPresent

reportService:
  image:
    repository: report-service
    tag: latest
    pullPolicy: IfNotPresent

sessionService:
  image:
    repository: session-service
    tag: latest
    pullPolicy: IfNotPresent

database:
  image:
    repository: database
    tag: latest
    pullPolicy: IfNotPresent

rabbitmq:
  image:
    repository: rabbitmq
    tag: latest
    pullPolicy: IfNotPresent




global:

  database:
    host: postgres
    port: 5432
    user: postgres
    password: master

  rabbitmq:
    host: rabbitmq
    port: 5672
    user: guest
    password: guest

  services:
    session:
      host: session-service
      port: 8081
    hotel:
      host: hotel-service
      port: 8082
    booking:
      host: booking-service
      port: 8083
    payment:
      host: payment-service
      port: 8084
    loyalty:
      host: loyalty-service
      port: 8085
    report:
      host: report-service
      port: 8086
    gateway:
      host: gateway-service
      port: 8087

databases:
  users: users_db
  hotels: hotels_db
  payments: payments_db
  balances: balances_db
  statistics: statistics_db
  reservations: reservations_db

rabbitmqConfig:
  queueName: messagequeue
  exchange: messagequeue-exchange

replicaCount: 1


secrets:
  publicKey: ""
  privateKey:  ""


postgresql:
  enabled: true
  persistence:
    enabled: true
    size: 1Gi

rabbitmq:
  enabled: true

certificates:
  enabled: false

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: "app.k3s.local"
      paths:
        - path: /
          pathType: Prefix
        - path: /api/v1/auth
          pathType: Prefix
        - path: /api/v1/gateway
          pathType: Prefix
  tls:
    - secretName: wildcard-cert-tls
      hosts:
        - "app.k3s.local" 
