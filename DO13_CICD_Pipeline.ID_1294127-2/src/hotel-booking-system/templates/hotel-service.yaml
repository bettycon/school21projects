apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-deployment
  labels:
    app: hotel
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: hotel
  template:
    metadata:
      labels:
        app: hotel
    spec:
      containers:
      - name: hotel
        image: "{{ .Values.hotelService.image.repository }}:{{ .Values.hotelService.image.tag }}"
        env:
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_PORT
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_DB_HOTELS
        volumeMounts:
        - name: jwt-keys
          mountPath: /app/config/jwt-keys.properties
          subPath: jwt-keys.properties
        ports:
        - containerPort: 8082
      volumes:
      - name: jwt-keys
        secret:
          secretName: jwt-file-secret
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-service
spec:
  selector:
    app: hotel
  ports:
  - port: 8082
    targetPort: 8082
