rule_files:
  - "alerts.yml" 
  
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
    
  - job_name: 'microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: 
          - 'gateway-service:8087'
          - 'session-service:8081'
          - 'hotel-service:8082'
          - 'booking-service:8083'
          - 'payment-service:8084'
          - 'loyalty-service:8085'
          - 'report-service:8086'
    scrape_interval: 30s

  - job_name: 'node-exporter'
    static_configs:
      - targets: 
          - '192.168.56.50:9100'
          - '192.168.56.51:9100'
          - '192.168.56.52:9100'

  - job_name: 'cadvisor'
    static_configs:
      - targets: 
          - '192.168.56.50:8080'
          - '192.168.56.51:8080'
          - '192.168.56.52:8080'

  - job_name: 'infrastructure'
    static_configs:
      - targets: 
          - 'loki:3100'
          - 'blackbox-exporter:9115'

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://gateway-service:8087/actuator/health
          - http://session-service:8081/actuator/health
          - https://google.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['app_stack_rabbitmq:15692']
    metrics_path: /metrics
    basic_auth:
      username: guest
      password: guest
    scrape_interval: 30s

