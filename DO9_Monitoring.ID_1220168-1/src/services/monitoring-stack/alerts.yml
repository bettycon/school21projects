groups:
  - name: alert_rules
    rules:
      - alert: Low Disk Space
        expr: node_filesystem_avail_bytes{mountpoint!="/boot"} / 1024 / 1024 < 100
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Available disk space on {{ $labels.mountpoint }} is less than 100 MB (current: {{ $value | humanize }} MB)"

      - alert: High RAM Usage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) > 1 * 1024 * 1024 * 1024
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High RAM usage on {{ $labels.instance }}"
          description: "Used RAM is more than 1 GB."

      - alert: High Service CPU Usage
        expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (container_label_com_docker_swarm_service_name) * 100 > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage for service {{ $labels.container_label_com_docker_swarm_service_name }}"
          description: "CPU usage for service exceeds 10% (current: {{ $value | humanize }}%)"  
